apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment
        slot: blue
    spec:
      containers:
        - name: sentiment-api
          image: worksh/sentiment-api:unstable
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: logs-volume
              mountPath: /app/logs
      volumes:
        - name: logs-volume
          persistentVolumeClaim:
            claimName: logs-pvc
