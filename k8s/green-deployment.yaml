apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-green-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment
      slot: green
  template:
    metadata:
      labels:
        app: sentiment
        slot: green
    spec:
      containers:
        - name: sentiment-api
          image: shamaimm/sentiment-api:stable
          ports:
            - containerPort: 5000
